# SubjectArea script-intent classification test cases
#
# Fields:
#   name         - unique identifier for this case
#   question     - user question
#   contextType  - UI context key: viewsheetScript | chartScript | worksheetScript | portal | ...
#   expModules   - expected module names (list, leave empty to skip check)
#   expSubmodules- expected submodule names (list, leave empty to skip check)
#   expScript    - expected script flag (boolean, omit to skip check)
# 
#  referenceDoc: https://github.com/bonnieshi43/test-garden/blob/main/assistant/script/script-%E6%A0%87%E8%AE%B0%E5%88%86%E6%9E%90%26TestCase.md

cases:
  # --- Positive script intent cases (should be script=true) ---
  # CaseID: TC-P01
  # 类别: 正向用例
  # 验证规则: 显式脚本/代码创建
  # 设计意图: 用户明确使用 "script" 一词进行代码编写。任何直接提到编写、创建或编辑脚本、代码或自定义表达式的查询都必须产生 script=true，无论针对哪个组件。
  - name: TC-P01
    question: How do I write a script to dynamically change the color of chart data points based on their values?
    contextType: dashboard
    expScript: true

  # CaseID: TC-P02
  # 类别: 正向用例
  # 验证规则: 编程语言引用
  # 设计意图: 查询在编码上下文中命名了特定编程语言（JavaScript）——用户明确打算编写代码，而不是使用 UI 控件。在代码编写上下文中引用任何具体编程语言都必须触发 script=true。
  - name: TC-P02
    question: How can I use JavaScript to control the visibility of a Text component based on a RadioButton selection?
    contextType: dashboard
    expScript: true

  # CaseID: TC-P03
  # 类别: 正向用例
  # 验证规则: 复杂逻辑控制结构
  # 设计意图: 查询需要循环（遍历行），这是一种复杂的逻辑控制结构，无法通过任何 UI 对话框表达。实现循环或多级嵌套条件必须触发 script=true。
  - name: TC-P03
    question: How do I write an expression that loops through all table rows and marks each row red when the sales value exceeds 1000?
    contextType: dashboard
    expScript: true

  # CaseID: TC-P04
  # 类别: 正向用例
  # 验证规则: 自定义函数定义
  # 设计意图: 用户打算定义一个新的命名函数，该函数不作为内置功能存在。编写产品中不存在的自定义函数或算法必须触发 script=true。
  - name: TC-P04
    question: How do I define a custom function that converts a timestamp into a human-readable date string like "Mar 5, 2026" for use in a dashboard expression?
    contextType: dashboard
    expScript: true

  # CaseID: TC-P05
  # 类别: 正向用例
  # 验证规则: Admin Console 操作
  # 设计意图: 用户在执行操作的上下文中明确提到 "Admin Console"。Admin Console 任务通过 Groovy DSL 编写脚本；任何引用 Admin Console 执行操作的查询都必须触发 script=true。
  # Bug #74040
  - name: TC-P05
    question: How do I use the Admin Console to automate the removal of a Data Source?
    contextType: dashboard
    expScript: true

  # CaseID: TC-P06
  # 类别: 正向用例
  # 验证规则: runQuery 使用
  # 设计意图: 查询明确涉及 runQuery，这是一个只能从脚本调用的编程 API（无法通过 UI 访问）。任何提到使用或操作 runQuery 结果的查询都必须触发 script=true。
  - name: TC-P06
    question: How can I use runQuery to load data from a Data Worksheet and assign the first row's value to a Text component?
    contextType: dashboard
    expScript: true

  # CaseID: TC-P07
  # 类别: 正向用例
  # 验证规则: "function" 关键词在代码调用上下文中
  # 设计意图: 查询在调用代码函数（createBulletGraph()）的意义上使用 "function"。当 "function" 指的是调用、定义或操作代码级函数（而不是产品功能）时，必须触发 script=true。
  - name: TC-P07
    question: How do I call the createBulletGraph() function to build a bullet chart programmatically?
    contextType: dashboard
    expScript: true

  # --- Negative / non-script intent cases (should be script=false) ---
  # CaseID: TC-N01
  # 类别: 负向用例
  # 验证规则: CALC 公式函数（GUI 辅助，非脚本）
  # 设计意图: CALC 函数（例如 CALC.sumif）通过 Formula Editor 对话框输入，这是一个 GUI 辅助功能，不需要 JavaScript 编写。虽然它们类似于函数调用，但它们不是脚本，不得触发 script=true。
  # Bug #74041
  - name: TC-N01
    question: Where can I use CALC.sumif to calculate total sales where the quantity purchased exceeds 50?
    contextType: dashboard
    expScript: false

  # CaseID: TC-N02
  # 类别: 负向用例
  # 验证规则: 纯 UI 配置操作
  # 设计意图: 用户正在导航产品菜单和对话框来设置组件，没有暗示代码编写。基于 UI 的配置操作必须产生 script=false，无论其复杂性如何。
  - name: TC-N02
    question: How do I configure a selection list component to filter a table by region using the dashboard designer?
    contextType: dashboard
    expScript: false

  # CaseID: TC-N03
  # 类别: 负向用例
  # 验证规则: 概念性/描述性问题
  # 设计意图: 用户正在寻求产品知识，没有代码，没有 UI 操作。不涉及编写表达式、脚本或执行 GUI 步骤的纯概念性或描述性问题必须产生 script=false。
  - name: TC-N03
    question: What types of chart elements are available in StyleBI and what are the differences between them?
    contextType: dashboard
    expScript: false

  # CaseID: TC-N04
  # 类别: 负向用例（边界）
  # 验证规则: 编程语言提及但非编码意图（TC-P02 的边界）
  # 设计意图: 出现了编程语言名称，但意图是事实性/架构性问题，不是编写代码的请求。仅提及语言名称而没有编码意图不得触发 script=true，这是编程语言规则的边界条件。
  # 产品上问script是false，自动化不稳定有时候pass
  - name: TC-N04
    question: Is the StyleBI frontend built with JavaScript or TypeScript?
    contextType: dashboard
    expScript: false

  # CaseID: TC-N05
  # 类别: 负向用例（边界）
  # 验证规则: "function" 指产品功能，非代码（TC-P07 的边界）
  # 设计意图: "Feature" 以及扩展的产品功能名称描述 UI 功能，而不是代码函数。当 "function" 或相关术语指的是产品功能而不是可调用的代码函数时，不得触发 script=true，这是函数提及规则的边界条件。
  - name: TC-N05
    question: How does the drill-down feature work in a crosstab table?
    contextType: dashboard
    expScript: false

  # CaseID: TC-N06
  # 类别: 负向用例（边界）
  # 验证规则: 通过 UI 可实现的条件逻辑（TC-P03 的边界）
  # 设计意图: 任务涉及条件逻辑（如果值 > 1000 → 红色），但完全可以通过内置的条件格式化 UI 对话框实现。相同逻辑存在 GUI 路径意味着它不符合“需要脚本的复杂逻辑”，这是将 UI 支持的条件与仅脚本的循环/嵌套逻辑分开的边界条件。
  - name: TC-N06
    question: How do I set a highlight rule in the conditional formatting dialog to color table rows red when the value exceeds 1000?
    contextType: dashboard
    expScript: false

  # --- gui_required override case (gui_required=true should win over script=true) ---
  # CaseID: TC-G01
  # 类别: gui_required 覆盖
  # 验证规则: gui_required 覆盖 script（isScriptModule 逻辑）
  # 设计意图: 查询包含两个脚本触发信号：命名 JavaScript（规则 2）和提到编写表达式（规则 1），但还需要导航 GUI（在属性面板中打开 Script 选项卡），这设置了 gui_required=true。isScriptModule(gui_required=true, script=true) 必须返回 false，因为 gui_required 优先，用于验证在 LLM 产生 script=true 后正确应用代码级覆盖逻辑。
  - name: TC-G01
    question: How do I open the Script tab in the component properties panel and write a JavaScript expression to hide a text label?
    contextType: dashboard
    expScript: false

  # --- Multi-turn conversation cases ---
  # CaseID: TC-M01
  # 类别: 多轮对话
  # 验证规则: 脚本导向的前一轮的确认
  # 设计意图: 当前一轮建立了脚本上下文（明确的脚本编写意图）时，当前轮中的简短确认或后续问题不包含独立的脚本触发器。completeQueryByHistory prompt 必须检测历史中的 script=true 并重建面向脚本的 replaced_query（例如，"如何在使用 runQuery 结果的 onInit 脚本中构造变量赋值？"）。然后 querySubjectAreas prompt 评估此重写的查询并必须产生 script=true。验证历史驱动的查询补全保留脚本方向。
  # 产品上问script是true
  - name: TC-M01
    question: Yes, that approach looks right. How do I properly structure the variable assignment?
    contextType: dashboard
    chatHistory:
      - role: user
        content: How do I write a script in the onInit handler to load data using runQuery and assign the first record's value to a Text component?
      - role: assistant
        content: You can write a script in the onInit handler that calls runQuery() to fetch data, then access the first record and assign its value to the Text component using component.text = result[0].fieldName.
    expScript: true

  # CaseID: TC-M02
  # 类别: 多轮对话
  # 验证规则: 非脚本历史，当前轮引入脚本意图
  # 设计意图: 前一轮是非脚本 UI 问题。当前轮独立引入脚本触发内容：编程语言引用（JavaScript）和明确的表达式编写意图。当前查询自己的信号必须占主导地位。验证单轮可以在不被非脚本历史抑制的情况下将 script 从 false 切换到 true。
  - name: TC-M02
    question: Can I achieve the same filtering logic by writing a JavaScript expression instead?
    contextType: dashboard
    chatHistory:
      - role: user
        content: How do I add a filter condition to a table using the filter toolbar?
      - role: assistant
        content: You can add a filter condition by clicking the filter icon in the table toolbar, then selecting the column and setting the filter criteria in the dialog.
    expScript: true

  # CaseID: TC-M03
  # 类别: 多轮对话
  # 验证规则: 脚本历史，当前轮无关的 UI 操作
  # 设计意图: 前一轮是面向脚本的，但当前轮是一个独立的 UI 配置问题（Format 面板），没有编码意图。必须独立评估当前查询并产生 script=false。验证当当前查询明确是非脚本时，先前的脚本上下文不会"渗透"到当前轮。
  - name: TC-M03
    question: How do I change the font size for the same component using the Format panel?
    contextType: dashboard
    chatHistory:
      - role: user
        content: How do I write a script to dynamically set the foreground color of a Text component?
      - role: assistant
        content: You can write a script that sets the component's foreground color dynamically using component.foreground = new Color(255, 0, 0) for red, or use conditional logic based on data values.
    expScript: false

  # --- Rule 7 "Function" boundary cases ---
  # CaseID: TC-F01
  # 类别: 负向用例（边界）
  # 验证规则: "function" 指内置函数文档查询，非代码调用（TC-P07 的边界）
  # 设计意图: 用户在询问产品中有哪些内置函数可用，是文档检索性质的提问。
  #   "function" 出现了但用户意图是查阅功能列表，而非编写/调用代码。
  #   规则 7 要求 "function-based operations"（使用/调用函数），
  #   纯粹询问函数列表不满足该条件，必须产生 script=false。
  - name: TC-F01
    question: What built-in functions are supported in the StyleBI Formula Editor?
    contextType: dashboard
    expScript: false

  # CaseID: TC-F02
  # 类别: 负向用例（边界）
  # 验证规则: "function" 指 CALC GUI 函数使用说明，非脚本（TC-P07 与 TC-N01 的交叉边界）
  # 设计意图: 用户询问如何在 Formula Editor 中使用 SUM 函数，属于 GUI 辅助的表达式输入，
  #   与 TC-N01 的 CALC 函数场景一致。虽然提到 "function" 但操作路径完全在 GUI 中完成。
  #   必须产生 script=false。
  - name: TC-F02
    question: How does the SUM function work when used in a calculated field in the Formula Editor?
    contextType: dashboard
    expScript: false

  # CaseID: TC-F03
  # 类别: 负向用例（边界）
  # 验证规则: "function" 出现在概念比较问题中，非调用意图（TC-P07 的边界）
  # 设计意图: 用户对两个内置函数进行概念性比较，没有编写、调用或操作任何函数的意图。
  #   "function" 出现多次但全部是名词性引用，无调用语义。必须产生 script=false。
  - name: TC-F03
    question: What is the difference between the NOW() function and the TODAY() function in StyleBI?
    contextType: dashboard
    expScript: false

  # CaseID: TC-F04
  # 类别: 正向用例（边界）
  # 验证规则: "function" 指表达式语法中的函数调用，涉及脚本/表达式编写（TC-P07 类型）
  # 设计意图: 用户询问如何在表达式（expression）中使用 IF 函数实现条件逻辑，
  #   这是脚本/表达式语法层面的操作，属于 "function-based operations" 的范畴。
  #   与 TC-N01 的差异在于用户意图是编写含逻辑的表达式，而非使用 GUI 向导。
  #   必须产生 script=true。
  - name: TC-F04
    question: How do I use the IF function inside an expression to return different text values based on a field condition?
    contextType: dashboard
    expScript: true

  # --- Additional multi-turn conversation cases ---
  # CaseID: TC-M04
  # 类别: 多轮对话
  # 验证规则: 脚本历史中间插入非脚本轮后，继续脚本话题
  # 设计意图: 对话历史中最近一轮是非脚本的 UI 问题（TC-M03 模式），但当前轮重新引入
  #   明确的脚本意图（调用 runQuery）。completeQueryByHistory 使用 Stack 从最新一轮向前搜索，
  #   应识别当前轮自身携带的脚本信号，而非被上一轮的非脚本历史压制。
  #   验证：非脚本历史不会阻止当前轮独立判定为 script=true。
  - name: TC-M04
    question: Can I use runQuery in the same onInit handler to load a second dataset?
    contextType: dashboard
    chatHistory:
      - role: user
        content: How do I write a script in the onInit handler to load data using runQuery and assign the first record's value to a Text component?
      - role: assistant
        content: You can write a script in the onInit handler that calls runQuery() to fetch data, then access the first record and assign its value to the Text component using component.text = result[0].fieldName.
      - role: user
        content: How do I change the font size for the Text component using the Format panel?
      - role: assistant
        content: You can change the font size by selecting the Text component, opening the Format panel on the right, and adjusting the font size in the Font section.
    expScript: true

  # CaseID: TC-M05
  # 类别: 多轮对话
  # 验证规则: 脚本历史中，用户以字段名作为选项确认，script 方向应保留
  # 设计意图: completeQueryByHistory prompt 的 Selection 处理规则规定，当用户回复是一个选项/字段名时，
  #   需要结合历史重建高层意图，并在历史 script=true 时保持脚本导向。
  #   用户回复 "Sales Amount" 本身不含脚本信号，但历史上下文是脚本操作，
  #   replaced_query 必须被重建为表达式/脚本导向（例如"如何在表达式中引用 Sales Amount 字段"）。
  #   验证：字段名确认不会将脚本历史上下文切换为非脚本。
  - name: TC-M05
    question: Sales Amount
    contextType: dashboard
    chatHistory:
      - role: user
        content: How do I write a script to calculate the aggregation of a field and assign the result to a label?
      - role: assistant
        content: You can use sum() or other aggregation functions in the script. Which field would you like to aggregate — Sales Amount, Profit, or Quantity?
    expScript: true

  # CaseID: TC-M06
  # 类别: 多轮对话
  # 验证规则: 较长历史（5 轮），最近一轮为脚本轮，当前轮为模糊跟进
  # 设计意图: 测试 completeQueryByHistory Stack 搜索在较长对话中的稳定性。
  #   历史含多轮交替的脚本与非脚本内容，但最近一轮（index -1）是脚本导向，
  #   当前轮 "What about the second condition?" 是模糊跟进，不含独立脚本信号。
  #   Stack 从最新轮向前搜索，应匹配最近的脚本历史轮并重建脚本导向的 replaced_query。
  #   验证：Stack 搜索能在多轮历史中正确找到最近相关的脚本上下文。
  - name: TC-M06
    question: What about the second condition?
    contextType: dashboard
    chatHistory:
      - role: user
        content: How do I create a new table component on a dashboard?
      - role: assistant
        content: You can drag a Table element from the component panel onto the dashboard canvas.
      - role: user
        content: How do I bind a data field to a table column?
      - role: assistant
        content: Select the table, open the Data Binding panel, and drag the field to the desired column slot.
      - role: user
        content: How do I write a script with nested if-else conditions to set the row background color based on multiple value ranges?
      - role: assistant
        content: You can write a script using nested if-else blocks. For example, if (value > 1000) { color = 'red'; } else if (value > 500) { color = 'yellow'; } else { color = 'green'; } Then assign this color to the row's background property.
    expScript: true

  # --- Additional gui_required override cases ---

  # CaseID: TC-G02
  # 类别: gui_required 覆盖
  # 验证规则: GUI 导航 + 脚本编写混合，gui_required 覆盖 script（isScriptModule 逻辑）
  # 设计意图: 与 TC-G01 意图相同但措辞不同，用于验证 gui_required 判定的语言稳定性。
  #   "navigate to" 明确是 GUI 操作步骤，即使后半句提到编写表达式，
  #   gui_required=true 必须优先，isScriptModule(true, true) = false。
  #   验证：不同措辞的 GUI 导航请求均能稳定触发 gui_required=true。
  - name: TC-G02
    question: How do I navigate to the Script Editor panel and write an expression to dynamically change the chart title?
    contextType: dashboard
    expScript: false

  # CaseID: TC-G03
  # 类别: gui_required 覆盖（边界）
  # 验证规则: Admin Console 操作（规则 5）与 GUI 导航的叠加——gui_required 覆盖 script
  # 设计意图: "Admin Console" 触发规则 5（script=true），但 "where do I find" 是位置导航提问，
  #   表明用户首先需要通过 UI 界面找到 Admin Console 入口，属于 GUI 操作步骤。
  #   prompt 中 gui_required 规则要求用户"明确强调任务必须通过 UI 完成"，
  #   此处 "find" 暗示了界面导航需求，预期 gui_required=true 覆盖 script=true，最终 script=false。
  #   验证：Admin Console 规则与 gui_required 覆盖的优先级行为。
  - name: TC-G03
    question: Where do I find the Admin Console in the portal to run a server-side script?
    contextType: dashboard
    expScript: false

  # CaseID: TC-G04
  # 类别: gui_required 覆盖
  # 验证规则: 编程语言引用（规则 2）+ GUI 步骤引导请求，gui_required 覆盖 script
  # 设计意图: 查询包含 JavaScript（触发规则 2，script=true），同时用户要求被引导完成"先打开哪个 tab"，
  #   表明需要 GUI 操作步骤，应触发 gui_required=true。
  #   isScriptModule(true, true) 必须返回 false。
  #   验证：规则 2 与 gui_required 覆盖同时触发时，代码层覆盖逻辑正确运行。
  - name: TC-G04
    question: I want to write a JavaScript expression for a component — which tab do I need to open first in the properties panel?
    contextType: dashboard
    expScript: false
  
    # --- "expression" keyword ambiguity cases ---

  # CaseID: TC-E01
  # 类别: 正向用例（边界）
  # 验证规则: "write" + "expression" 组合，脚本语法场景（TC-N01 的边界）
  # 设计意图: "write an expression" 的措辞组合了规则 1 的 "writing" 触发词和 "expression"。
  #   与 TC-N01 的区别在于此处没有提到 CALC 或 Formula Editor，而是指向通用表达式编写，
  #   含有编写意图（"write"），应触发 script=true。
  #   验证：在没有 CALC/Formula Editor 上下文时，"write an expression" 必须判为脚本。
  - name: TC-E01
    question: How do I write an expression to calculate the year-over-year growth rate for a field?
    contextType: dashboard
    expScript: true

  # CaseID: TC-E02
  # 类别: 负向用例（边界）
  # 验证规则: "expression" 出现在 Formula Editor GUI 操作上下文中，非脚本（TC-N01 类型）
  # 设计意图: 用户要在 Data Worksheet 中创建 calculated field，使用 Formula Editor 输入表达式，
