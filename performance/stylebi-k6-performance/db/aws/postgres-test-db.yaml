AWSTemplateFormatVersion: 2010-09-09
Description: >-
  PostgreSQL database for StyleBI k6 load testing. Deploy this alongside your StyleBI stack.
  Automatically initializes the database with test data using an ECS task.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Database Configuration"
        Parameters:
          - ResourceNamePrefix
          - DatabaseInstanceClass
          - DatabaseAllocatedStorage
          - DatabasePassword
          - MaxConnections
          - DeleteData
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcId
          - VpcCidr
          - SubnetIds
          - StyleBISecurityGroupId
      - Label:
          default: "ECS Configuration (for automatic initialization)"
        Parameters:
          - EcsClusterArn
          - AssignPublicIp

Parameters:
  ResourceNamePrefix:
    Description: The prefix for generated resource names (should match your StyleBI stack)
    Type: String
  VpcId:
    Description: The VPC where StyleBI is deployed
    Type: "AWS::EC2::VPC::Id"
  VpcCidr:
    Description: The CIDR for the VPC
    Type: String
    Default: "172.31.0.0/16"
  SubnetIds:
    Description: Subnets for the database (use same subnets as StyleBI)
    Type: "CommaDelimitedList"
  StyleBISecurityGroupId:
    Description: Security group ID of the StyleBI ECS service (for ingress rules)
    Type: "AWS::EC2::SecurityGroup::Id"
  EcsClusterArn:
    Description: ARN of the StyleBI ECS cluster (for running the database initialization task)
    Type: String
  AssignPublicIp:
    Description: Whether to assign a public IP to the initialization task (use ENABLED for public subnets)
    Type: String
    Default: "ENABLED"
    AllowedValues:
      - "ENABLED"
      - "DISABLED"
  DatabaseInstanceClass:
    Description: The instance type for the RDS database
    Type: String
    Default: "db.t3.medium"
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.r6g.large
      - db.r6g.xlarge
  DatabaseAllocatedStorage:
    Description: The allocated storage size in GB
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 1000
  DatabasePassword:
    Description: Master password for the database
    Type: String
    NoEcho: true
    MinLength: 8
  MaxConnections:
    Description: Maximum database connections
    Type: Number
    Default: 600
  DeleteData:
    Description: If true, deletes the database when the stack is deleted
    Type: String
    Default: "true"
    AllowedPattern: "true|false"

Conditions:
  DeleteDataCondition: !Equals [!Ref DeleteData, "true"]

Resources:
  # ===========================================
  # Database Resources
  # ===========================================

  # Security group for RDS
  DatabaseSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Allow StyleBI servers to connect to PostgreSQL"
      GroupName: !Join ["-", [!Ref ResourceNamePrefix, "db-sg"]]
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # Allow from StyleBI ECS service
        - IpProtocol: "TCP"
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref StyleBISecurityGroupId
        # Allow from VPC (for debugging/admin access and init task)
        - IpProtocol: "TCP"
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: !Join ["-", [!Ref ResourceNamePrefix, "db-sg"]]

  # Subnet group for RDS
  DatabaseSubnetGroup:
    Type: "AWS::RDS::DBSubnetGroup"
    Properties:
      DBSubnetGroupDescription: "Subnet group for StyleBI test database"
      DBSubnetGroupName: !Join ["-", [!Ref ResourceNamePrefix, "db-subnet-group"]]
      SubnetIds: !Ref SubnetIds

  # Parameter group for custom settings
  DatabaseParameterGroup:
    Type: "AWS::RDS::DBParameterGroup"
    Properties:
      Family: postgres15
      Description: "Custom parameters for StyleBI k6 test database"
      Parameters:
        max_connections: !Ref MaxConnections

  # RDS PostgreSQL instance
  Database:
    Type: "AWS::RDS::DBInstance"
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Join ["-", [!Ref ResourceNamePrefix, "test-db"]]
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: postgres
      EngineVersion: "15"
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      StorageType: gp3
      DBName: orders
      MasterUsername: testuser
      MasterUserPassword: !Ref DatabasePassword
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      PubliclyAccessible: false
      DBParameterGroupName: !Ref DatabaseParameterGroup
      BackupRetentionPeriod: !If
        - DeleteDataCondition
        - 0
        - 7
      MultiAZ: false
      EnablePerformanceInsights: false
      Tags:
        - Key: Name
          Value: !Join ["-", [!Ref ResourceNamePrefix, "test-db"]]
        - Key: Purpose
          Value: "k6-load-testing"

  # ===========================================
  # Database Initialization (ECS Task + Lambda)
  # ===========================================

  # CloudWatch Log Group for init task
  InitTaskLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName: !Join ["/", ["/ecs", !Ref ResourceNamePrefix, "db-init"]]
      RetentionInDays: 7

  # IAM Role for ECS Task Execution (pulling images, writing logs)
  InitTaskExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Join ["-", [!Ref ResourceNamePrefix, "db-init-exec-role"]]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"

  # IAM Role for the ECS Task itself (no special permissions needed)
  InitTaskRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Join ["-", [!Ref ResourceNamePrefix, "db-init-task-role"]]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"

  # ECS Task Definition for database initialization
  InitTaskDefinition:
    Type: "AWS::ECS::TaskDefinition"
    Properties:
      Family: !Join ["-", [!Ref ResourceNamePrefix, "db-init"]]
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt InitTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt InitTaskRole.Arn
      ContainerDefinitions:
        - Name: db-init
          Image: postgres:15-alpine
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InitTaskLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: init
          Environment:
            - Name: PGHOST
              Value: !GetAtt Database.Endpoint.Address
            - Name: PGPORT
              Value: !GetAtt Database.Endpoint.Port
            - Name: PGDATABASE
              Value: orders
            - Name: PGUSER
              Value: testuser
            - Name: PGPASSWORD
              Value: !Ref DatabasePassword
          EntryPoint:
            - "/bin/sh"
            - "-c"
          Command:
            - |
              echo "Waiting for database to be ready..."
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                echo "Database not ready, waiting..."
                sleep 5
              done
              echo "Database is ready. Initializing schema and data..."

