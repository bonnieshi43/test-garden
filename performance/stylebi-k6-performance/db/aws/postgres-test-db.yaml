                CONSTRAINT "PK_CATEGORY_ID" PRIMARY KEY ("CATEGORY_ID")
              );
              INSERT INTO "CATEGORIES" ("CATEGORY_ID", "CATEGORY_NAME") VALUES
                (1, 'Games'), (2, 'Educational'), (3, 'Business'),
